name: phase3c-quality

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  quality-gate:
    runs-on: [self-hosted, Linux, X64, arlen, iep-apt]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        env:
          ARLEN_CI_GNUSTEP_STRATEGY: preinstalled
        run: |
          bash ./tools/ci/install_ci_dependencies.sh

      - name: Run Phase 3C quality gate
        env:
          GNUSTEP_USER_ROOT: ${{ github.workspace }}/.gnustep
        run: |
          bash ./tools/ci/run_phase3c_quality.sh

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-artifacts-${{ github.run_id }}
          path: |
            build/perf
            tests/performance/baselines
            tests/performance/policies
