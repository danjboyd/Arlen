name: phase5e-quality

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  quality-gate:
    runs-on: [self-hosted, Linux, X64, arlen, iep-apt]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        env:
          ARLEN_CI_GNUSTEP_STRATEGY: preinstalled
        run: |
          bash ./tools/ci/install_ci_dependencies.sh

      - name: Run Phase 5E quality gate
        env:
          GNUSTEP_USER_ROOT: ${{ github.workspace }}/.gnustep
          ARLEN_PERF_BASELINE_ROOT: tests/performance/baselines/iep-apt
        run: |
          bash ./tools/ci/run_phase5e_quality.sh

      - name: Run Phase 9J release certification pack
        if: github.event_name == 'release'
        env:
          GNUSTEP_USER_ROOT: ${{ github.workspace }}/.gnustep
        run: |
          ARLEN_PHASE9J_RELEASE_ID="${{ github.event.release.tag_name }}" \
            bash ./tools/ci/run_phase9j_release_certification.sh

      - name: Upload perf + confidence artifacts
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: phase5e-artifacts-${{ github.run_id }}
          path: |
            build/perf
            build/release_confidence
            tests/performance/baselines
            tests/performance/policies
