name: linux-quality

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: [self-hosted, Linux, X64, arlen, iep-apt]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        env:
          ARLEN_CI_GNUSTEP_STRATEGY: preinstalled
        run: |
          bash ./tools/ci/install_ci_dependencies.sh

      - name: Run Phase 5E quality gate
        env:
          GNUSTEP_USER_ROOT: ${{ github.workspace }}/.gnustep
          ARLEN_PERF_BASELINE_ROOT: tests/performance/baselines/iep-apt
        run: |
          bash ./tools/ci/run_phase5e_quality.sh

      - name: Upload perf + confidence artifacts
        if: github.event_name == 'workflow_dispatch' || failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-quality-artifacts-${{ github.run_id }}
          path: |
            build/perf
            build/release_confidence
            tests/performance/baselines
            tests/performance/policies
          if-no-files-found: warn
