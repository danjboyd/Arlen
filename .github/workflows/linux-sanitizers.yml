name: linux-sanitizers

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sanitizer-gate:
    runs-on: [self-hosted, Linux, X64, arlen, iep-apt]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        env:
          ARLEN_CI_GNUSTEP_STRATEGY: preinstalled
        run: |
          bash ./tools/ci/install_ci_dependencies.sh

      - name: Run Phase 10M sanitizer matrix gate
        env:
          GNUSTEP_USER_ROOT: ${{ github.workspace }}/.gnustep
          ARLEN_PHASE10M_INCLUDE_THREAD_NIGHTLY: "0"
          ARLEN_PERF_RETRY_COUNT: "3"
        run: |
          bash ./tools/ci/run_phase10m_sanitizer_matrix.sh

      - name: Upload sanitizer confidence artifacts
        if: github.event_name == 'workflow_dispatch' || failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-sanitizers-artifacts-${{ github.run_id }}
          path: |
            build/release_confidence/phase10m/sanitizers/**
            build/release_confidence/phase10m/backend_parity/**
            build/release_confidence/phase10m/protocol_adversarial/**
            build/release_confidence/phase10m/syscall_faults/**
            build/release_confidence/phase10m/allocation_faults/**
            build/release_confidence/phase10m/soak/**
            build/release_confidence/phase10m/chaos_restart/**
            build/release_confidence/phase10m/static_analysis/**
            build/sanitizers/phase10m_thread_race/**
          if-no-files-found: warn

  thread-race-nightly:
    runs-on: [self-hosted, Linux, X64, arlen, iep-apt]
    continue-on-error: true
    timeout-minutes: 120
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        env:
          ARLEN_CI_GNUSTEP_STRATEGY: preinstalled
        run: |
          bash ./tools/ci/install_ci_dependencies.sh

      - name: Run Phase 10M nightly thread-race lane
        env:
          GNUSTEP_USER_ROOT: ${{ github.workspace }}/.gnustep
        run: |
          bash ./tools/ci/run_phase10m_thread_race_nightly.sh

      - name: Upload thread-race nightly artifacts
        if: github.event_name == 'workflow_dispatch' || failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-thread-race-nightly-${{ github.run_id }}
          path: build/sanitizers/phase10m_thread_race/**
          if-no-files-found: warn
