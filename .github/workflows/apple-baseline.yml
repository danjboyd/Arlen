name: apple-baseline

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apple-baseline:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select full Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install Apple build dependencies
        env:
          ARLEN_CI_APPLE_STRATEGY: brew
        run: |
          bash ./tools/ci/install_ci_dependencies.sh

      - name: Run Apple baseline confidence gate
        run: |
          bash ./tools/ci/run_apple_baseline_confidence.sh

      - name: Upload Apple confidence artifacts
        if: github.event_name == 'workflow_dispatch' || failure()
        uses: actions/upload-artifact@v4
        with:
          name: apple-baseline-confidence-${{ github.run_id }}
          path: |
            build/release_confidence/phase30/**
          if-no-files-found: warn
