name: windows-preview

on:
  push:
    branches:
      - windows-clang64-integration
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  windows-preview:
    runs-on: [self-hosted, Windows, X64, arlen, msys2-clang64]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Windows preview runtime parity lane
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\run_clang64.ps1 -InnerCommand "bash ./tools/ci/run_phase24_windows_preview.sh"

      - name: Run Windows packaged release confidence lane
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\run_clang64.ps1 -InnerCommand "make phase31-confidence"

      - name: Upload Windows preview artifacts
        if: github.event_name == 'workflow_dispatch' || failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-preview-artifacts-${{ github.run_id }}
          path: |
            build/phase24
            build/release_confidence/phase31
            build/tests
          if-no-files-found: warn
